name: test project 
on: push
jobs:
  test:
    runs-on: ubuntu-latest 
    steps:
      - name: Get Code
        uses: actions/checkout@v7
      - name: install Python 
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'    
      - name: install reiquirments
        run: pip install -r requirements.txt
      - name: Install dbt
        run: pip install dbt-core dbt-sqlserver
      - name: run test data quality 
        run: pytest tests/test_data_quality.py